project_name: spec2cov
code_version: 0.1.0

data_root: data
db_path: data/pipeline.db
raw_dir: data/raw
preprocess_dir: data/preprocess
export_dir: data/exports
log_dir: data/logs

runtime:
  concurrency: 4
  timeout_sec: 30
  retry_count: 3
  user_agent: spec2cov/0.1
  github_token_env: GITHUB_TOKEN

discovery:
  provider: github
  max_repos: 50
  max_files_per_repo: 50
  repo_languages:
    - Verilog
    - SystemVerilog
  extensions:
    - .v
    - .sv
    - .md
    - .xml
    - .xlsx
    - .ralf
    - .hvp
    - .pdf
  uvm_keywords:
    - UVM
    - uvm
    - universal verification methodology
  excluded_repo_name_keywords:
    - tool
  search_queries:
    - "UVM language:Verilog"
    - '"SystemVerilog" UVM'
    - '"universal verification methodology" verilog'
  repo_sort: stars
  repo_order: desc
  github_api_base: https://api.github.com
  github_per_page: 50
  request_interval_sec: 0.8
  low_remaining_threshold: 200
  rate_limit_buffer_sec: 5
  secondary_limit_wait_sec: 60
  secondary_limit_max_retries: 3

filters:
  sv_keywords:
    - module
    - interface
    - covergroup
    - bins
    - coverpoint
    - cover
    - cross
  md_spec_keywords:
    - protocol
    - behavior
    - design
    - functional
    - feature
    - module
    - interface
  max_file_size_kb: 1024
  min_text_chars: 40
  project_cluster_file_threshold: 10
  project_cluster_path_depth_tolerance: 2
  project_cluster_ignore_name_tokens:
    - tb
    - dut
    - sim

dedup:
  enabled: true
  shingle_size: 5
  minhash_perm: 128
  jaccard_threshold: 0.85

quality_gates:
  min_cover_blocks: 1
  min_plan_segments: 1
  min_spec_chars: 120
  min_dut_blocks: 1
  min_total_artifacts: 3

export:
  dataset_prefix: cvdp
  default_category: spec-to-coverage
  default_difficulty: medium
  prompt_template: |
    Based on the provided specification, plan, DUT, and verification context, generate the missing coverage artifacts.
  system_message: |
    You are an expert verification engineer. Produce coverage-oriented outputs grounded in the provided context.
